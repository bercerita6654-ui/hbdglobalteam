<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Ulang Tahun Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Font Pacifico untuk efek handwriting Happy Birthday */
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f0f4f8; 
        }
        
        /* Custom Scrollbar Utama */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #60a5fa; }
        
        /* Scrollbar tersembunyi untuk dalam kotak kalender */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes soft-pulse {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { opacity: 0.9; transform: scale(0.95); box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
        }
        .today-pulse { animation: soft-pulse 2.5s infinite; }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body class="text-slate-800 h-screen w-screen flex flex-col relative z-0 bg-slate-50 overflow-hidden">

    <div style="font-family: 'Pacifico', cursive; position: absolute; opacity: 0; pointer-events: none;">.</div>

    <!-- Latar Belakang Animasi -->

        <div class="absolute top-0 -left-4 w-72 h-72 md:w-96 md:h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>

    </div>

    <!-- Header -->

        <div class="flex items-center gap-2 md:gap-3">
            <div class="bg-gradient-to-tr from-blue-500 to-blue-700 text-white p-2 rounded-xl shadow-md shadow-blue-200 shrink-0">

            </div>
            <div class="min-w-0">
                <h1 class="text-sm md:text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-900 to-blue-600 leading-tight truncate">Kalender Ultah Admin</h1>

        </div>
        
        <div class="flex items-center gap-1.5 md:gap-2 shrink-0">
            <button id="btnSync" onclick="syncGoogleSheets()" class="bg-white hover:bg-blue-50 border border-blue-100 text-blue-700 px-2.5 md:px-4 py-1.5 md:py-2 rounded-xl font-bold shadow-sm transition-all flex items-center gap-1.5 group text-xs md:text-sm hover:shadow-md">
                <i class="fas fa-sync-alt text-blue-500 group-hover:rotate-180 transition-transform duration-500" id="syncIcon"></i> <span class="hidden sm:inline">Sync Data</span>
            </button>
            <button onclick="openModal('addModal')" class="bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-500 hover:to-yellow-600 text-blue-900 px-2.5 md:px-4 py-1.5 md:py-2 rounded-xl font-extrabold shadow-md shadow-yellow-200 transition-all flex items-center gap-1.5 text-xs md:text-sm transform hover:-translate-y-0.5 border border-yellow-300">
                <i class="fas fa-plus"></i> <span class="hidden sm:inline">Tambah</span>

    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-[1600px] mx-auto p-2 md:p-4 flex flex-col lg:flex-row items-stretch gap-2 md:gap-4 relative z-10 overflow-hidden min-h-0">
        
        <!-- Bagian Kiri: Kalender Utama -->
        <div class="flex-1 w-full glass-panel rounded-xl md:rounded-2xl shadow-xl shadow-blue-200/40 flex flex-col border border-white overflow-hidden min-h-0">
            
            <div class="flex justify-between items-center p-2 md:p-4 border-b border-blue-100 bg-white/40 shrink-0">
                <button onclick="changeMonth(-1)" class="p-1.5 bg-white border border-blue-100 hover:bg-blue-50 hover:border-blue-300 rounded-lg md:rounded-xl text-blue-600 hover:text-blue-800 shadow-sm transition-all h-8 w-8 md:h-10 md:w-10 flex items-center justify-center transform hover:scale-105">
                    <i class="fas fa-chevron-left text-xs md:text-sm"></i>

                    <div class="text-center font-bold text-blue-800 uppercase text-[9px] md:text-xs tracking-widest bg-white rounded-sm py-1 shadow-sm border border-blue-50">Jum</div>

        <!-- Bagian Kanan: List Ulang Tahun Bulan Ini -->

    <!-- Modal Tambah Ulang Tahun -->

        <div class="bg-white rounded-3xl shadow-2xl border border-blue-100 w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300 my-auto">

            <div class="p-5 md:p-6 bg-white">
                <form id="addForm" onsubmit="handleFormSubmit(event)">

                        <label class="block text-sm font-bold text-blue-900 mb-1.5 md:mb-2">Nomor WA</label>

                    </div>
                    <div class="flex justify-end gap-2 md:gap-3">
                        <button type="button" onclick="closeModal('addModal')" class="px-4 py-2 md:px-5 md:py-2.5 bg-white border border-blue-100 text-slate-600 hover:bg-blue-50 rounded-xl font-bold transition-colors text-sm md:text-base shadow-sm">Batal</button>
                        <button type="submit" class="px-4 py-2 md:px-6 md:py-2.5 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white rounded-xl font-bold shadow-md shadow-blue-200 transition-all text-sm md:text-base transform hover:scale-105 border border-blue-600">Simpan Data</button>

    <!-- Modal Detail Hari -->
    <div id="dayModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl border border-blue-100 w-full max-w-lg overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-full">
            <div class="p-4 md:p-6 border-b border-blue-100 flex justify-between items-center bg-gradient-to-r from-blue-50 via-white to-yellow-50 shrink-0 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 opacity-20 text-6xl text-yellow-400 transform rotate-12"><i class="fas fa-gift"></i></div>
                <div class="flex items-center gap-3 relative z-10">
                    <div class="bg-blue-600 text-white w-10 h-10 md:w-12 md:h-12 rounded-2xl flex items-center justify-center text-xl md:text-2xl shadow-md shadow-blue-200 transform -rotate-6 border border-blue-500">
                        <i class="fas fa-calendar-day text-yellow-300"></i>
                    </div>
                    <h3 id="dayModalTitle" class="text-xl md:text-2xl font-extrabold text-blue-900 tracking-tight">Tanggal</h3>
                </div>
                <button onclick="closeModal('dayModal')" class="relative z-10 bg-white border border-blue-100 text-slate-400 hover:text-rose-500 hover:bg-rose-50 w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center transition-all shadow-sm">
                    <i class="fas fa-times md:text-lg"></i>
                </button>
            </div>
            <!-- Content Modal bisa discroll jika terisi banyak info -->
            <div class="p-4 md:p-6 overflow-y-auto bg-slate-50/50 custom-scrollbar" id="dayModalContent">
                <!-- Konten dinamis -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 left-6 md:left-auto bg-blue-900/95 backdrop-blur-md border border-blue-700/50 text-white px-5 py-3 md:px-6 md:py-4 rounded-2xl shadow-2xl flex items-center gap-3 md:gap-4 transform translate-y-24 opacity-0 transition-all duration-500 z-[60]">
        <div class="bg-gradient-to-br from-yellow-400 to-yellow-500 text-blue-900 w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center shrink-0 shadow-lg border border-yellow-300">
            <i class="fas fa-check text-sm md:text-base font-bold"></i>
        </div>
        <span id="toastMessage" class="font-medium text-xs md:text-sm tracking-wide text-white">Pesan sukses</span>
    </div>

    <script>
        // ==========================================
        // KONFIGURASI TAUTAN GOOGLE SHEETS
        // ==========================================
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOVvv7LDJJEnIxJ_GM_qcXve6LjXoe1_idUIqWowKX12BQmSEUewcHOtYepVDD9rBygkbU1G9RjpQD/pub?gid=0&single=true&output=csv";

        let currentDate = new Date();
        const currentMonth = String(currentDate.getMonth() + 1).padStart(2, '0');
        const todayDay = String(currentDate.getDate()).padStart(2, '0');
        
        let birthdays = [
            { id: 1, nama: "Budi (Budi Santoso)", jabatan: "Manager", outlet: "Pusat", tempatLahir: "Jakarta", tanggal: `1990-${currentMonth}-${todayDay}`, noWa: "628123456789" },
            { id: 2, nama: "Siti (Siti Aminah)", jabatan: "Staff", outlet: "Cabang 1", tempatLahir: "Bandung", tanggal: `1995-${currentMonth}-15`, noWa: "628987654321" },
            { id: 3, nama: "Joko (Joko Anwar)", jabatan: "Admin", outlet: "Cabang 2", tempatLahir: "Surabaya", tanggal: `1988-${currentMonth}-28`, noWa: "" }
        ];

        const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        function init() {
            renderCalendar();
            syncGoogleSheets(true);
        }

        // ==========================================
        // BUKA POP-UP DETAIL DARI SIDEBAR
        // ==========================================
        window.openDetailFromSidebar = function(day) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthStr = String(month + 1).padStart(2, '0');
            const dayStr = String(day).padStart(2, '0');
            const filterStr = `-${monthStr}-${dayStr}`; 
            
            const daysBirthdays = birthdays.filter(b => {
                if(!b.tanggal) return false;
                return b.tanggal.endsWith(filterStr);
            });

            showDayDetails(day, monthNames[month], daysBirthdays);
        }

        // ==========================================
        // COPY TEXT WA SAJA
        // ==========================================
        function copyGreeting(namaStr) {
            let shortName = namaStr.split(' (')[0].trim();
            if(!shortName) shortName = namaStr; 
            
            // Unicode emotikon: 🥳 (\uD83E\uDD73), 🙏 (\uD83D\uDE4F), 🙌 (\uD83D\uDE4C)
            const template = `Selamat Ulang Tahun, ${shortName}! \uD83E\uDD73 kami Keluarga besar GLOBAL MART mendoakan yang terbaik untukmu. Semoga sehat selalu, panjang umur, dan terus semangat berkarya! \uD83D\uDE4F\uD83D\uDE4C`;
            
            const textArea = document.createElement("textarea");
            textArea.value = template;
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast(`Teks ucapan untuk ${shortName} disalin!`);
            } catch (err) {
                alert('Browser Anda tidak mendukung fitur copy otomatis.');
            }
            document.body.removeChild(textArea);
        }

        // ==========================================
        // BUKA LINK WHATSAPP & AUTO-COPY GAMBAR
        // ==========================================
        async function shareToWA(namaStr, noWaStr, tanggalLahir) {
            let shortName = namaStr.split(' (')[0].trim();
            if(!shortName) shortName = namaStr; 
            
            // Gunakan Unicodes murni agar emotikon tidak corrupt
            const template = `Selamat Ulang Tahun, ${shortName}! \uD83E\uDD73  kami Keluarga besar GLOBAL MART mendoakan yang terbaik untukmu. Semoga sehat selalu, panjang umur, dan terus semangat berkarya! \uD83D\uDE4F\uD83D\uDE4C`;
            
            try {
                showToast('Menyiapkan gambar & teks ucapan...');
                const canvas = await getFlyerCanvas(namaStr, tanggalLahir);
                
                canvas.toBlob(async (blob) => {
                    let copySuccess = false;
                    const file = new File([blob], `Flyer_Ultah_${shortName}.png`, { type: 'image/png' });

                    // 1. Coba fitur Web Share modern (Sangat sukses di Mobile / Windows 11 / Mac)
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                text: template,
                                title: 'Ucapan Ulang Tahun'
                            });
                            // Jika berhasil share native, langsung hentikan fungsi disini
                            return; 
                        } catch (err) {
                            console.log("Share dibatalkan atau tidak disupport penuh, lanjut ke metode fallback...");
                        }
                    }

                    // 2. Metode Cadangan (Buka WA Web/App + Copy Image)
                    try {
                        const data = [new ClipboardItem({ 'image/png': blob })];
                        await navigator.clipboard.write(data);
                        copySuccess = true;
                    } catch (err) {
                        console.warn('Gagal copy gambar ke clipboard', err);
                    }

                    // Setup link wa.me untuk teks ucapan
                    const encodedText = encodeURIComponent(template);
                    let waUrl = '';
                    if (noWaStr && noWaStr !== "undefined" && noWaStr !== "") {
                        waUrl = `https://wa.me/${noWaStr}?text=${encodedText}`;
                    } else {
                        waUrl = `https://api.whatsapp.com/send?text=${encodedText}`;
                    }
                    
                    // Beri tahu pengguna untuk Paste
                    if (copySuccess) {
                        alert(`GAMBAR BERHASIL DISALIN!\n\nKarena aturan keamanan WhatsApp, gambar tidak bisa otomatis terlampir di link.\n\nLANGKAH-LANGKAH:\n1. Tekan OK, Tab WhatsApp akan terbuka.\n2. Klik pada kolom ketik pesan di WhatsApp.\n3. Tekan CTRL + V (atau Klik Kanan -> Tempel/Paste).\n\nGambar Flyer & Teks akan muncul bersamaan!`);
                    } else {
                        // Jika copy gambar gagal (karena batasan browser), copy teksnya saja
                        copyGreeting(namaStr);
                        alert(`Teks ucapan berhasil disalin!\n\n(Browser Anda mencegah penyalinan gambar otomatis. Silakan unduh gambar flyer melalui tombol "Flyer" lalu kirim secara manual ke WA)`);
                    }

                    window.open(waUrl, '_blank');

                }, 'image/png');
                
            } catch(e) {
                console.error(e);
                alert('Terjadi kesalahan saat memproses data ke WhatsApp.');
            }
        }


        // ==========================================
        // GENERATOR FLYER OTOMATIS (CANVAS API)
        // ==========================================
        async function getFlyerCanvas(namaStr, tanggalLahir) {
            await document.fonts.ready;
            const canvas = document.createElement('canvas');
            canvas.width = 1080;
            canvas.height = 1080;
            const ctx = canvas.getContext('2d');
            
            let fullName = namaStr;
            const match = namaStr.match(/\(([^)]+)\)/);
            if (match) fullName = match[1].trim();

            const currentYear = new Date().getFullYear();
            const flyerDate = tanggalLahir.trim().replace(/\d{4}$/, currentYear);

            // Background
            const gradient = ctx.createLinearGradient(0, 0, 1080, 1080);
            gradient.addColorStop(0, '#1e3a8a');
            gradient.addColorStop(1, '#3b82f6');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 1080, 1080);

            // Blobs Latar
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.beginPath(); ctx.arc(150, 150, 400, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(950, 900, 500, 0, Math.PI * 2); ctx.fill();

            // Kue Lapis 1
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath(); ctx.ellipse(540, 310, 180, 25, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffffff'; 
            ctx.fillRect(400, 210, 280, 100);
            ctx.beginPath(); ctx.ellipse(540, 310, 140, 20, 0, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = '#f1f5f9'; 
            ctx.beginPath(); ctx.ellipse(540, 210, 140, 20, 0, 0, Math.PI*2); ctx.fill(); 

            // Logo Simulasian
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(415, 230);
            ctx.quadraticCurveTo(540, 255, 665, 230);
            ctx.lineTo(665, 280);
            ctx.quadraticCurveTo(540, 305, 415, 280);
            ctx.closePath();
            ctx.fillStyle = '#ffff00'; 
            ctx.fill();
            ctx.textAlign = 'center';
            ctx.fillStyle = '#0000ff';
            ctx.font = '900 32px "Arial Black", Arial, sans-serif';
            ctx.fillText('GLOBAL MART', 540, 265);
            ctx.fillStyle = '#ff0000'; 
            ctx.font = '900 11px "Arial Black", Arial, sans-serif';
            ctx.fillText('ALAT TULIS KANTOR & SEKOLAH', 540, 283);

        function parseDate(dateStr) {
            if (!dateStr) return "";
            dateStr = String(dateStr).trim();
            if (dateStr.includes('T')) dateStr = dateStr.split('T')[0];
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
            
            const monthsIndo = {
                'januari': '01', 'jan': '01', 'februari': '02', 'feb': '02', 'maret': '03', 'mar': '03', 'april': '04', 'apr': '04',
                'mei': '05', 'may': '05', 'juni': '06', 'jun': '06', 'juli': '07', 'jul': '07', 'agustus': '08', 'agu': '08', 'aug': '08',
                'september': '09', 'sep': '09', 'oktober': '10', 'okt': '10', 'oct': '10', 'november': '11', 'nov': '11', 'desember': '12', 'des': '12', 'dec': '12'
            };

            let textMatch = dateStr.match(/^(\d{1,2})[\s\-\/]+([a-zA-Z]+)[\s\-\/]+(\d{2,4})$/);
            if(textMatch) {
                let d = textMatch[1].padStart(2, '0');
                let mText = textMatch[2].toLowerCase();
                let y = textMatch[3];
                if(y.length === 2) y = parseInt(y) > 50 ? '19'+y : '20'+y;
                let m = monthsIndo[mText] || '01';
                return `${y}-${m}-${d}`;
            }

            let parts = dateStr.split(/[\/\-\.]/);
            if (parts.length === 3) {
                if (parts[0].length === 4) { 
                    return `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
                } else if (parts[2].length === 4) { 
                    return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                } else if (parts[2].length === 2) { 
                    let year = parseInt(parts[2]) > 50 ? '19'+parts[2] : '20'+parts[2];
                    return `${year}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                }
            }
            return dateStr;
        }

        function processCSVWithPapaParse(text, callbackFn) {
            Papa.parse(text, {
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    const rows = results.data;
                    const parsedResult = [];
                    let currentMaxId = birthdays.length > 0 ? Math.max(...birthdays.map(b => b.id)) : 0;
                    
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row.length >= 7) {
                            const namaAsli = (row[1] || '').trim();
                            const namaPanggilan = (row[2] || '').trim();
                            const jabatan = (row[3] || '').trim();
                            const outlet = (row[4] || '').trim();
                            const tempatLahir = (row[5] || '').trim();
                            const rawDate = (row[6] || '').trim();
                            // Ambil No WA dari Kolom ke-8 (index 7)
                            const rawNoWa = row.length >= 8 ? (row[7] || '').trim() : '';

                            if (namaAsli && rawDate) {
                                const namaFinal = namaPanggilan ? `${namaPanggilan} (${namaAsli})` : namaAsli;
                                
                                // Bersihkan nomor WA (hapus karakter selain angka)
                                let cleanWa = rawNoWa.replace(/\D/g, '');
                                // Otomatis ubah awalan 0 menjadi 62 standar WhatsApp
                                if (cleanWa.startsWith('0')) {
                                    cleanWa = '62' + cleanWa.substring(1);
                                }

                                parsedResult.push({
                                    id: ++currentMaxId,
                                    nama: namaFinal,
                                    jabatan: jabatan,
                                    outlet: outlet,
                                    tempatLahir: tempatLahir,
                                    tanggal: parseDate(rawDate),
                                    noWa: cleanWa
                                });
                            }
                        }
                    }
                    callbackFn(parsedResult);
                },
                error: function(err) {
                    console.error("PapaParse error:", err);
                    alert("Gagal membaca file CSV.");
                }
            });
        }

        async function syncGoogleSheets(isAuto = false) {
            const btn = document.getElementById('btnSync');
            const icon = document.getElementById('syncIcon');

            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            icon.classList.add('fa-spin');

            try {
                const cacheBusterUrl = SHEET_CSV_URL + "&t=" + new Date().getTime();
                let textResponse = "";

                try {
                    const response = await fetch(cacheBusterUrl);
                    if (!response.ok) throw new Error("Fetch Direct Gagal");
                    textResponse = await response.text();
                } catch (err) {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(cacheBusterUrl)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error("Proxy gagal");
                    textResponse = await response.text();
                }
                
                if (textResponse.trim().toLowerCase().startsWith('<!doctype') || textResponse.trim().toLowerCase().startsWith('<html')) {
                    throw new Error("Akses ditolak. Pastikan URL Publish to Web valid.");
                }

                processCSVWithPapaParse(textResponse, (newBirthdays) => {
                    if (newBirthdays && newBirthdays.length > 0) {
                        birthdays = newBirthdays;
                        renderCalendar();
                        if (isAuto) {
                            showToast(`Auto-sync: ${newBirthdays.length} data dimuat.`);
                        } else {
                            showToast(`${newBirthdays.length} data disinkronkan!`);
                        }
                    } else if (!isAuto) {
                        alert("Data ditarik tapi kosong. Periksa format kolom Sheet.");
                    }
                });
            } catch (error) {
                if (!isAuto) alert("Sinkronisasi gagal: " + error.message);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                icon.classList.remove('fa-spin');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => { toast.classList.add('translate-y-24', 'opacity-0'); }, 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
