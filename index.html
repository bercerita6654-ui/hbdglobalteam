<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Ulang Tahun Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f0f4f8; /* Soft blue-grey background */
        }
        
        /* Custom Scrollbar Utama */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #60a5fa; }
        
        /* Hilangkan scrollbar visual di dalam kotak kalender tapi tetap bisa discroll */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animasi Kustom */
        @keyframes soft-pulse {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { opacity: 0.9; transform: scale(0.95); box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
        }
        .today-pulse { animation: soft-pulse 2.5s infinite; }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        /* Efek Kaca (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body class="text-slate-800 h-screen w-screen flex flex-col overflow-hidden relative z-0">

    <!-- Latar Belakang Animasi Tema Biru & Kuning -->
    <div class="fixed inset-0 z-[-1] bg-slate-50 overflow-hidden">
        <div class="absolute top-0 -left-4 w-72 h-72 md:w-96 md:h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 md:w-96 md:h-96 bg-yellow-300 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 md:w-96 md:h-96 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Header / Navbar -->
    <header class="mx-2 md:mx-4 mt-2 md:mt-4 glass-panel shadow-lg shadow-blue-100/50 rounded-2xl px-4 md:px-6 py-2.5 md:py-3 flex justify-between items-center z-20 shrink-0 border-b border-blue-100">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-tr from-blue-500 to-blue-700 text-white p-2 md:p-2.5 rounded-xl shadow-md shadow-blue-200">
                <i class="fas fa-birthday-cake text-base md:text-xl text-yellow-300 animate-bounce" style="animation-duration: 2.5s;"></i>
            </div>
            <div>
                <h1 class="text-base md:text-xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-900 to-blue-600 leading-tight">Kalender Ultah Admin</h1>
                <p class="text-[10px] md:text-xs font-bold text-blue-500/80 uppercase tracking-wide">CV. GLOBAL JAYA SEJAHTERA</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button id="btnSync" onclick="syncGoogleSheets()" class="bg-white hover:bg-blue-50 border border-blue-100 text-blue-700 px-3 py-1.5 md:px-4 md:py-2 rounded-xl font-bold shadow-sm transition-all flex items-center gap-2 group text-xs md:text-sm hover:shadow-md">
                <i class="fas fa-sync-alt text-blue-500 group-hover:rotate-180 transition-transform duration-500" id="syncIcon"></i> <span class="hidden sm:inline">Sync Data</span>
            </button>
            
            <button onclick="openModal('addModal')" class="bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-500 hover:to-yellow-600 text-blue-900 px-3 py-1.5 md:px-4 md:py-2 rounded-xl font-extrabold shadow-md shadow-yellow-200 transition-all flex items-center gap-2 text-xs md:text-sm transform hover:-translate-y-0.5 border border-yellow-300">
                <i class="fas fa-plus"></i> <span class="hidden sm:inline">Tambah</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full p-2 md:p-4 flex flex-col items-center overflow-hidden min-h-0">
        <!-- Wrapper Kalender -->
        <div class="w-full max-w-7xl glass-panel rounded-3xl shadow-2xl shadow-blue-200/40 flex flex-col h-full overflow-hidden border border-white">
            
            <!-- Calendar Controls -->
            <div class="flex justify-between items-center p-3 md:p-5 border-b border-blue-100 bg-white/40 shrink-0">
                <button onclick="changeMonth(-1)" class="p-1.5 md:p-2 bg-white border border-blue-100 hover:bg-blue-50 hover:border-blue-300 rounded-xl text-blue-600 hover:text-blue-800 shadow-sm transition-all h-8 w-8 md:h-10 md:w-10 flex items-center justify-center transform hover:scale-105">
                    <i class="fas fa-chevron-left text-xs md:text-sm"></i>
                </button>
                <div class="text-center">
                    <h2 id="monthYearDisplay" class="text-lg md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-900 to-blue-600 capitalize tracking-tight drop-shadow-sm">Bulan Tahun</h2>
                </div>
                <button onclick="changeMonth(1)" class="p-1.5 md:p-2 bg-white border border-blue-100 hover:bg-blue-50 hover:border-blue-300 rounded-xl text-blue-600 hover:text-blue-800 shadow-sm transition-all h-8 w-8 md:h-10 md:w-10 flex items-center justify-center transform hover:scale-105">
                    <i class="fas fa-chevron-right text-xs md:text-sm"></i>
                </button>
            </div>

            <!-- Calendar Grid Container -->
            <div class="p-2 md:p-5 flex-1 flex flex-col min-h-0 overflow-hidden bg-white/30">
                <!-- Days of Week -->
                <div class="grid grid-cols-7 gap-1 md:gap-3 mb-2 md:mb-3 shrink-0">
                    <div class="text-center font-bold text-rose-500 uppercase text-[10px] md:text-sm tracking-widest bg-white rounded-lg py-1 md:py-2 shadow-sm border border-blue-50">Min</div>
                    <div class="text-center font-bold text-blue-800 uppercase text-[10px] md:text-sm tracking-widest bg-white rounded-lg py-1 md:py-2 shadow-sm border border-blue-50">Sen</div>
                    <div class="text-center font-bold text-blue-800 uppercase text-[10px] md:text-sm tracking-widest bg-white rounded-lg py-1 md:py-2 shadow-sm border border-blue-50">Sel</div>
                    <div class="text-center font-bold text-blue-800 uppercase text-[10px] md:text-sm tracking-widest bg-white rounded-lg py-1 md:py-2 shadow-sm border border-blue-50">Rab</div>
                    <div class="text-center font-bold text-blue-800 uppercase text-[10px] md:text-sm tracking-widest bg-white rounded-lg py-1 md:py-2 shadow-sm border border-blue-50">Kam</div>
                    <div class="text-center font-bold text-blue-800 uppercase text-[10px] md:text-sm tracking-widest bg-white rounded-lg py-1 md:py-2 shadow-sm border border-blue-50">Jum</div>
                    <div class="text-center font-bold text-yellow-600 uppercase text-[10px] md:text-sm tracking-widest bg-white rounded-lg py-1 md:py-2 shadow-sm border border-blue-50">Sab</div>
                </div>

                <!-- Days Cells -->
                <div id="calendarGrid" class="grid grid-cols-7 gap-1 md:gap-3 flex-1 auto-rows-fr min-h-0">
                    <!-- JS akan mengisi ini -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Tambah Ulang Tahun -->
    <div id="addModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300 overflow-y-auto">
        <div class="bg-white rounded-3xl shadow-2xl border border-blue-100 w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300 my-auto">
            <div class="p-5 md:p-6 border-b border-blue-50 flex justify-between items-center bg-gradient-to-r from-blue-50 to-white">
                <h3 class="text-lg md:text-xl font-bold text-blue-900">Tambah Manual</h3>
                <button onclick="closeModal('addModal')" class="bg-white border border-blue-100 text-blue-400 hover:text-rose-500 hover:bg-rose-50 w-8 h-8 rounded-full flex items-center justify-center transition-all shadow-sm">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-5 md:p-6 bg-white">
                <form id="addForm" onsubmit="handleFormSubmit(event)">
                    <div class="mb-4 md:mb-5">
                        <label class="block text-sm font-bold text-blue-900 mb-1.5 md:mb-2">Nama Lengkap & Panggilan</label>
                        <input type="text" id="adminName" required class="w-full px-3 py-2.5 md:px-4 md:py-3 bg-blue-50/50 border border-blue-100 rounded-xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-medium text-sm md:text-base text-blue-900" placeholder="Cth: Budi (Budi Santoso)">
                    </div>
                    <div class="mb-6 md:mb-8">
                        <label class="block text-sm font-bold text-blue-900 mb-1.5 md:mb-2">Tanggal Lahir</label>
                        <input type="date" id="adminDate" required class="w-full px-3 py-2.5 md:px-4 md:py-3 bg-blue-50/50 border border-blue-100 rounded-xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-medium text-blue-900 text-sm md:text-base">
                    </div>
                    <div class="flex justify-end gap-2 md:gap-3">
                        <button type="button" onclick="closeModal('addModal')" class="px-4 py-2 md:px-5 md:py-2.5 bg-white border border-blue-100 text-slate-600 hover:bg-blue-50 rounded-xl font-bold transition-colors text-sm md:text-base shadow-sm">Batal</button>
                        <button type="submit" class="px-4 py-2 md:px-6 md:py-2.5 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white rounded-xl font-bold shadow-md shadow-blue-200 transition-all text-sm md:text-base transform hover:scale-105 border border-blue-600">Simpan Data</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Detail Hari -->
    <div id="dayModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl border border-blue-100 w-full max-w-lg overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-full">
            <div class="p-4 md:p-6 border-b border-blue-100 flex justify-between items-center bg-gradient-to-r from-blue-50 via-white to-yellow-50 shrink-0 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 opacity-20 text-6xl text-yellow-400 transform rotate-12"><i class="fas fa-gift"></i></div>
                <div class="flex items-center gap-3 relative z-10">
                    <div class="bg-blue-600 text-white w-10 h-10 md:w-12 md:h-12 rounded-2xl flex items-center justify-center text-xl md:text-2xl shadow-md shadow-blue-200 transform -rotate-6 border border-blue-500">
                        <i class="fas fa-calendar-day text-yellow-300"></i>
                    </div>
                    <h3 id="dayModalTitle" class="text-xl md:text-2xl font-extrabold text-blue-900 tracking-tight">Tanggal</h3>
                </div>
                <button onclick="closeModal('dayModal')" class="relative z-10 bg-white border border-blue-100 text-slate-400 hover:text-rose-500 hover:bg-rose-50 w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center transition-all shadow-sm">
                    <i class="fas fa-times md:text-lg"></i>
                </button>
            </div>
            <div class="p-4 md:p-6 overflow-y-auto bg-slate-50/50" id="dayModalContent">
                <!-- Konten dinamis -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 left-6 md:left-auto bg-blue-900/95 backdrop-blur-md border border-blue-700/50 text-white px-5 py-3 md:px-6 md:py-4 rounded-2xl shadow-2xl flex items-center gap-3 md:gap-4 transform translate-y-24 opacity-0 transition-all duration-500 z-[60]">
        <div class="bg-gradient-to-br from-yellow-400 to-yellow-500 text-blue-900 w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center shrink-0 shadow-lg border border-yellow-300">
            <i class="fas fa-check text-sm md:text-base font-bold"></i>
        </div>
        <span id="toastMessage" class="font-medium text-xs md:text-sm tracking-wide text-white">Pesan sukses</span>
    </div>

    <script>
        // ==========================================
        // KONFIGURASI TAUTAN GOOGLE SHEETS
        // ==========================================
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOVvv7LDJJEnIxJ_GM_qcXve6LjXoe1_idUIqWowKX12BQmSEUewcHOtYepVDD9rBygkbU1G9RjpQD/pub?gid=0&single=true&output=csv";

        let currentDate = new Date();
        const currentMonth = String(currentDate.getMonth() + 1).padStart(2, '0');
        const todayDay = String(currentDate.getDate()).padStart(2, '0');
        
        let birthdays = [
            { id: 1, nama: "Budi (Budi Santoso)", jabatan: "Manager", outlet: "Pusat", tempatLahir: "Jakarta", tanggal: `1990-${currentMonth}-${todayDay}` },
            { id: 2, nama: "Siti (Siti Aminah)", jabatan: "Staff", outlet: "Cabang 1", tempatLahir: "Bandung", tanggal: `1995-${currentMonth}-15` },
            { id: 3, nama: "Joko (Joko Anwar)", jabatan: "Admin", outlet: "Cabang 2", tempatLahir: "Surabaya", tanggal: `1988-${currentMonth}-28` }
        ];

        const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        function init() {
            renderCalendar();
            syncGoogleSheets(true);
        }

        // ==========================================
        // TEMPLATE UCAPAN ULANG TAHUN
        // ==========================================
        function copyGreeting(fullName) {
            let shortName = fullName.split(' (')[0].trim();
            if(!shortName) shortName = fullName; 
            
            const template = `Selamat Ulang Tahun, ${shortName}! 🎂🎉 kami Keluarga besar GLOBAL MART mendoakan yang terbaik untukmu. Semoga sehat selalu, panjang umur, dan terus semangat berkarya! ✨`;
            
            const textArea = document.createElement("textarea");
            textArea.value = template;
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast(`Ucapan untuk ${shortName} disalin!`);
            } catch (err) {
                alert('Browser Anda tidak mendukung fitur copy otomatis.');
            }
            document.body.removeChild(textArea);
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('monthYearDisplay').innerText = `${monthNames[month]} ${year}`;
            
            const firstDayOfMonth = new Date(year, month, 1).getDay(); 
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            
            const calendarGrid = document.getElementById('calendarGrid');
            calendarGrid.innerHTML = ''; 

            for (let i = 0; i < firstDayOfMonth; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = "rounded-xl md:rounded-2xl border border-transparent bg-white/20";
                calendarGrid.appendChild(emptyCell);
            }

            const today = new Date();
            const isCurrentMonthYear = today.getMonth() === month && today.getFullYear() === year;

            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = isCurrentMonthYear && today.getDate() === day;
                const monthStr = String(month + 1).padStart(2, '0');
                const dayStr = String(day).padStart(2, '0');
                const filterStr = `-${monthStr}-${dayStr}`; 
                
                const daysBirthdays = birthdays.filter(b => {
                    if(!b.tanggal) return false;
                    return b.tanggal.endsWith(filterStr);
                });

                const cell = document.createElement('div');
                
                // Styling Kalender Card (Tema Biru Kuning)
                let cellClasses = "rounded-xl md:rounded-2xl p-1.5 md:p-3 border transition-all duration-300 cursor-pointer flex flex-col group relative overflow-hidden min-h-0 ";
                
                if (isToday) {
                    cellClasses += "bg-white border-blue-400 shadow-lg shadow-blue-200/50 ring-2 ring-blue-500 z-10";
                } else if (daysBirthdays.length > 0) {
                    cellClasses += "bg-yellow-50/80 border-yellow-300 hover:border-yellow-400 hover:shadow-xl hover:shadow-yellow-200/50 hover:-translate-y-1 z-0 hover:z-10";
                } else {
                    cellClasses += "bg-white/80 border-white hover:bg-white hover:border-blue-200 hover:shadow-md z-0";
                }

                cell.className = cellClasses;
                cell.onclick = () => showDayDetails(day, monthNames[month], daysBirthdays);

                // Ornamen dekoratif
                const decorHTML = daysBirthdays.length > 0 ? `<div class="absolute -bottom-2 -right-2 md:-bottom-3 md:-right-3 text-yellow-400/30 text-3xl md:text-5xl transform -rotate-12 pointer-events-none transition-transform group-hover:scale-110 group-hover:text-yellow-400/50"><i class="fas fa-gift"></i></div>` : '';

                // Header Tanggal
                let dateHTML = `<div class="font-extrabold flex justify-between items-start z-10 relative shrink-0 mb-1 md:mb-2">
                    <span class="${isToday ? 'bg-blue-600 text-white w-6 h-6 md:w-8 md:h-8 flex items-center justify-center rounded-lg md:rounded-xl shadow-md today-pulse text-[11px] md:text-sm' : 'text-blue-900 ml-1 mt-1 text-xs md:text-sm group-hover:text-blue-600 transition-colors'}">${day}</span>
                </div>`;

                // List Ultah Mini - Strukturnya diperkuat agar tidak terpotong (menggunakan flex-between)
                let eventsHTML = `<div class="flex-1 flex flex-col gap-1 md:gap-1.5 overflow-y-auto z-10 relative min-h-0 pr-0.5 hide-scroll">`;
                daysBirthdays.forEach((b, index) => {
                    let shortName = b.nama.split(' (')[0].trim() || b.nama;
                    
                    // Hitung Usia
                    const birthYear = parseInt(b.tanggal.split('-')[0]);
                    const age = year - birthYear;
                    const ageText = !isNaN(age) ? `<span class="bg-yellow-400 text-blue-900 px-1 py-0.5 md:px-1.5 rounded text-[8px] md:text-[9px] font-bold whitespace-nowrap shadow-sm ml-auto border border-yellow-300">${age} th</span>` : '';

                    // Layout event card yang lebih stabil agar teks tidak menghilang
                    eventsHTML += `
                        <div class="w-full bg-blue-600 text-white p-1 md:px-2 md:py-1.5 rounded-md md:rounded-lg shadow-sm flex items-center justify-between shrink-0 transform transition-transform group-hover:translate-x-0.5 border border-blue-500">
                            <div class="flex items-center gap-1 md:gap-1.5 overflow-hidden flex-1 min-w-0">
                                <i class="fas fa-birthday-cake text-yellow-300 text-[8px] md:text-[10px] shrink-0"></i> 
                                <span class="font-bold truncate text-[9px] md:text-[11px]">${shortName}</span>
                            </div>
                            ${ageText}
                        </div>
                    `;
                });
                
                eventsHTML += `</div>`;

                cell.innerHTML = decorHTML + dateHTML + eventsHTML;
                calendarGrid.appendChild(cell);
            }
        }

        function changeMonth(offset) {
            currentDate.setMonth(currentDate.getMonth() + offset);
            renderCalendar();
        }

        function openModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            modal.children[0].classList.remove('scale-95');
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('opacity-0');
            modal.children[0].classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); 
        }

        // Tampilan Modal Detail Hari - Tema Biru Kuning
        function showDayDetails(day, monthName, daysBirthdays) {
            document.getElementById('dayModalTitle').innerText = `${day} ${monthName}`;
            const content = document.getElementById('dayModalContent');
            
            if (daysBirthdays.length === 0) {
                content.innerHTML = `
                    <div class="text-center py-8 md:py-12 flex flex-col items-center">
                        <div class="bg-white w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center mb-3 md:mb-4 shadow-sm border border-blue-100">
                            <i class="fas fa-calendar-times text-2xl md:text-3xl text-blue-200"></i>
                        </div>
                        <p class="font-bold text-slate-500 text-sm md:text-base">Belum ada yang ulang tahun nih!</p>
                    </div>
                `;
            } else {
                let html = `<ul class="space-y-3 md:space-y-4">`;
                daysBirthdays.forEach(b => {
                    const birthYear = parseInt(b.tanggal.split('-')[0]);
                    const currentYear = new Date().getFullYear();
                    const age = currentYear - birthYear;
                    
                    // Lencana Usia Kuning
                    const ageText = !isNaN(age) ? `<div class="text-[10px] md:text-[11px] font-bold bg-yellow-100 text-yellow-800 px-2.5 py-1 md:px-3 md:py-1.5 rounded-lg md:rounded-xl shadow-sm border border-yellow-300 uppercase tracking-widest whitespace-nowrap">Usia ${age}</div>` : '';

                    const jabatanHtml = b.jabatan ? `<p class="text-[11px] md:text-xs font-bold text-blue-600 mt-1 md:mt-1.5 bg-blue-50 inline-block px-2 py-0.5 rounded-md border border-blue-100">${b.jabatan} <span class="text-slate-400 font-normal ml-1"> ${b.outlet ? '• ' + b.outlet : ''}</span></p>` : '';
                    const tempatLahirStr = b.tempatLahir ? `${b.tempatLahir}, ` : '';
                    
                    const safeName = b.nama.replace(/'/g, "\\'");

                    const dateParts = b.tanggal.split('-');
                    let formattedDate = b.tanggal;
                    if (dateParts.length === 3) {
                        const d = parseInt(dateParts[2], 10);
                        const mIndex = parseInt(dateParts[1], 10) - 1;
                        const y = dateParts[0];
                        formattedDate = `${d} ${monthNames[mIndex]} ${y}`;
                    }

                    html += `
                        <li class="bg-white border border-blue-100 p-3 md:p-5 rounded-2xl shadow-sm hover:shadow-md hover:border-blue-300 transition-all duration-300 flex flex-col sm:flex-row sm:items-center justify-between gap-3 md:gap-4 group relative overflow-hidden">
                            <div class="absolute right-0 top-0 w-32 h-32 bg-blue-50 rounded-full blur-2xl transform translate-x-10 -translate-y-10 group-hover:bg-yellow-50 transition-all"></div>
                            
                            <div class="flex items-start sm:items-center gap-3 md:gap-5 overflow-hidden w-full relative z-10">
                                <div class="bg-gradient-to-br from-blue-500 to-blue-700 text-white w-12 h-12 md:w-14 md:h-14 rounded-2xl flex shrink-0 items-center justify-center text-xl md:text-2xl shadow-md shadow-blue-200 border border-blue-400 transform group-hover:rotate-12 transition-transform">
                                    <i class="fas fa-user-astronaut text-yellow-300"></i>
                                </div>
                                <div class="truncate">
                                    <p class="font-extrabold text-blue-950 text-sm md:text-lg truncate tracking-tight" title="${b.nama}">${b.nama}</p>
                                    ${jabatanHtml}
                                    <p class="text-[10px] md:text-xs text-slate-500 font-semibold mt-1.5 md:mt-2 truncate flex items-center gap-1.5"><i class="fas fa-calendar-alt text-yellow-500"></i> ${tempatLahirStr}${formattedDate}</p>
                                </div>
                            </div>
                            <div class="flex items-center sm:flex-col items-end gap-2 shrink-0 border-t sm:border-t-0 pt-3 sm:pt-0 border-blue-50 w-full sm:w-auto justify-between sm:justify-end relative z-10">
                                ${ageText}
                                <button onclick="copyGreeting('${safeName}')" class="w-auto bg-[#25D366] hover:bg-[#1DA851] text-white px-3 py-1.5 md:px-4 md:py-2 rounded-xl text-[10px] md:text-xs font-bold transition-all flex items-center justify-center gap-2 shadow-md shadow-[#25D366]/30 transform hover:-translate-y-0.5 border border-[#1DA851]">
                                    <i class="fab fa-whatsapp text-sm md:text-base"></i> Copy Ucapan
                                </button>
                            </div>
                        </li>
                    `;
                });
                html += `</ul>`;
                content.innerHTML = html;
            }
            openModal('dayModal');
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const nama = document.getElementById('adminName').value;
            const tanggal = document.getElementById('adminDate').value;

            if (nama && tanggal) {
                const newId = birthdays.length > 0 ? Math.max(...birthdays.map(b => b.id)) + 1 : 1;
                birthdays.push({ id: newId, nama, tanggal });
                
                document.getElementById('addForm').reset();
                closeModal('addModal');
                renderCalendar();
                showToast("Ulang tahun berhasil ditambahkan!");
            }
        }

        function parseDate(dateStr) {
            if (!dateStr) return "";
            dateStr = String(dateStr).trim();
            if (dateStr.includes('T')) dateStr = dateStr.split('T')[0];
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
            
            const monthsIndo = {
                'januari': '01', 'jan': '01', 'februari': '02', 'feb': '02', 'maret': '03', 'mar': '03', 'april': '04', 'apr': '04',
                'mei': '05', 'may': '05', 'juni': '06', 'jun': '06', 'juli': '07', 'jul': '07', 'agustus': '08', 'agu': '08', 'aug': '08',
                'september': '09', 'sep': '09', 'oktober': '10', 'okt': '10', 'oct': '10', 'november': '11', 'nov': '11', 'desember': '12', 'des': '12', 'dec': '12'
            };

            let textMatch = dateStr.match(/^(\d{1,2})[\s\-\/]+([a-zA-Z]+)[\s\-\/]+(\d{2,4})$/);
            if(textMatch) {
                let d = textMatch[1].padStart(2, '0');
                let mText = textMatch[2].toLowerCase();
                let y = textMatch[3];
                if(y.length === 2) y = parseInt(y) > 50 ? '19'+y : '20'+y;
                let m = monthsIndo[mText] || '01';
                return `${y}-${m}-${d}`;
            }

            let parts = dateStr.split(/[\/\-\.]/);
            if (parts.length === 3) {
                if (parts[0].length === 4) { 
                    return `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
                } else if (parts[2].length === 4) { 
                    return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                } else if (parts[2].length === 2) { 
                    let year = parseInt(parts[2]) > 50 ? '19'+parts[2] : '20'+parts[2];
                    return `${year}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                }
            }
            return dateStr;
        }

        function processCSVWithPapaParse(text, callbackFn) {
            Papa.parse(text, {
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    const rows = results.data;
                    const parsedResult = [];
                    let currentMaxId = birthdays.length > 0 ? Math.max(...birthdays.map(b => b.id)) : 0;
                    
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row.length >= 7) {
                            const namaAsli = (row[1] || '').trim();
                            const namaPanggilan = (row[2] || '').trim();
                            const jabatan = (row[3] || '').trim();
                            const outlet = (row[4] || '').trim();
                            const tempatLahir = (row[5] || '').trim();
                            const rawDate = (row[6] || '').trim();

                            if (namaAsli && rawDate) {
                                const namaFinal = namaPanggilan ? `${namaPanggilan} (${namaAsli})` : namaAsli;
                                parsedResult.push({
                                    id: ++currentMaxId,
                                    nama: namaFinal,
                                    jabatan: jabatan,
                                    outlet: outlet,
                                    tempatLahir: tempatLahir,
                                    tanggal: parseDate(rawDate)
                                });
                            }
                        }
                    }
                    callbackFn(parsedResult);
                },
                error: function(err) {
                    console.error("PapaParse error:", err);
                    alert("Gagal membaca file CSV.");
                }
            });
        }

        async function syncGoogleSheets(isAuto = false) {
            const btn = document.getElementById('btnSync');
            const icon = document.getElementById('syncIcon');

            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            icon.classList.add('fa-spin');

            try {
                const cacheBusterUrl = SHEET_CSV_URL + "&t=" + new Date().getTime();
                let textResponse = "";

                try {
                    const response = await fetch(cacheBusterUrl);
                    if (!response.ok) throw new Error("Fetch Direct Gagal");
                    textResponse = await response.text();
                } catch (err) {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(cacheBusterUrl)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error("Proxy gagal");
                    textResponse = await response.text();
                }
                
                if (textResponse.trim().toLowerCase().startsWith('<!doctype') || textResponse.trim().toLowerCase().startsWith('<html')) {
                    throw new Error("Akses ditolak. Pastikan URL Publish to Web valid.");
                }

                processCSVWithPapaParse(textResponse, (newBirthdays) => {
                    if (newBirthdays && newBirthdays.length > 0) {
                        birthdays = newBirthdays;
                        renderCalendar();
                        if (isAuto) {
                            showToast(`Auto-sync: ${newBirthdays.length} data dimuat.`);
                        } else {
                            showToast(`${newBirthdays.length} data disinkronkan!`);
                        }
                    } else if (!isAuto) {
                        alert("Data ditarik tapi kosong. Periksa format kolom Sheet.");
                    }
                });
            } catch (error) {
                if (!isAuto) alert("Sinkronisasi gagal: " + error.message);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                icon.classList.remove('fa-spin');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => { toast.classList.add('translate-y-24', 'opacity-0'); }, 3000);
        }

        window.onload = init;
    </script>
